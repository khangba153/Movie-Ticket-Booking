<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxCinema - Quản lý Đơn Vé</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/Admin/admin.css">
</head>
<body>
    <header class="fc-header">
        <div class="fc-logo">FoxCinema ADMIN</div>
        <nav class="fc-nav">
            <span class="fc-welcome" id="welcomeAdmin"></span>
            <a href="/home.html">Trang chủ</a>
            <button class="fc-btn fc-btn-secondary" id="logoutBtn" style="padding:6px 16px;font-size:13px;">Đăng xuất</button>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-tabs">
            <a href="/Admin/admin-movie.html">Phim</a>
            <a href="/Admin/admin-cinema.html">Rạp</a>
            <a href="/Admin/admin-showtime.html">Lịch Chiếu</a>
            <a href="/Admin/admin-booking.html" class="active">Đơn Vé</a>
        </div>

        <div class="admin-toolbar">
            <div class="filter-group">
                <select id="filterMovie"><option value="">-- Tất cả phim --</option></select>
                <select id="filterCinema"><option value="">-- Tất cả rạp --</option></select>
                <input type="date" id="filterFromDate" title="Từ ngày">
                <input type="date" id="filterToDate" title="Đến ngày">
            </div>
        </div>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Mã</th>
                        <th>Khách hàng</th>
                        <th>Phim</th>
                        <th>Rạp</th>
                        <th>Suất chiếu</th>
                        <th>Ghế</th>
                        <th>Tổng tiền</th>
                        <th>Ngày đặt</th>
                    </tr>
                </thead>
                <tbody id="bookingTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="/Admin/admin-booking.js"></script>
</body>
</html>
