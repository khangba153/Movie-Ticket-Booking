<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxCinema - Admin</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/Admin/admin.css">
</head>
<body>
    <header class="fc-header">
        <div class="fc-logo">FoxCinema ADMIN</div>
        <nav class="fc-nav">
            <span class="fc-welcome" id="welcomeAdmin"></span>
            <a href="/home.html">Trang chủ</a>
            <button class="fc-btn fc-btn-secondary" id="logoutBtn" style="padding:6px 16px;font-size:13px;">Đăng xuất</button>
        </nav>
    </header>

    <div class="admin-container">
        <h1 class="admin-title">QUẢN TRỊ HỆ THỐNG</h1>
        <div class="admin-tabs">
            <a href="/Admin/admin-movie.html">Phim</a>
            <a href="/Admin/admin-cinema.html">Rạp</a>
            <a href="/Admin/admin-showtime.html">Lịch Chiếu</a>
            <a href="/Admin/admin-booking.html">Đơn Vé</a>
        </div>
        <div class="empty-state">Chọn một mục ở trên để quản lý.</div>
    </div>

    <script>
        (function() {
            const role = localStorage.getItem("role");
            if (role !== "Admin") { window.location.href = "/auth.html"; return; }
            const u = localStorage.getItem("username");
            document.getElementById("welcomeAdmin").textContent = "Admin: " + (u || "");
            document.getElementById("logoutBtn").addEventListener("click", function() {
                localStorage.clear();
                window.location.href = "/auth.html";
            });
        })();
    </script>
</body>
</html>
