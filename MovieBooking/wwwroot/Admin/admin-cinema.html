<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxCinema - Quản lý Rạp</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/Admin/admin.css">
</head>
<body>
    <header class="fc-header">
        <div class="fc-logo">FoxCinema ADMIN</div>
        <nav class="fc-nav">
            <span class="fc-welcome" id="welcomeAdmin"></span>
            <a href="/home.html">Trang chủ</a>
            <button class="fc-btn fc-btn-secondary" id="logoutBtn" style="padding:6px 16px;font-size:13px;">Đăng xuất</button>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-tabs">
            <a href="/Admin/admin-movie.html">Phim</a>
            <a href="/Admin/admin-cinema.html" class="active">Rạp</a>
            <a href="/Admin/admin-showtime.html">Lịch Chiếu</a>
            <a href="/Admin/admin-booking.html">Đơn Vé</a>
        </div>

        <div class="admin-toolbar">
            <input type="text" class="search-box" id="searchBox" placeholder="Tìm kiếm rạp...">
            <button class="btn-add" id="btnAdd">+ Thêm Rạp</button>
        </div>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên rạp</th>
                        <th>Địa chỉ</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="cinemaTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Add/Edit -->
    <div class="fc-modal-backdrop" id="cinemaModal">
        <div class="fc-modal" style="width:min(450px,90vw);">
            <button class="fc-modal-close" id="modalClose">&times;</button>
            <h2 class="modal-title" id="modalTitle">Thêm Rạp</h2>
            <form id="cinemaForm">
                <input type="hidden" id="cinemaId">
                <div class="admin-form-group">
                    <label>Tên rạp *</label>
                    <input type="text" id="fName" required>
                </div>
                <div class="admin-form-group">
                    <label>Địa chỉ *</label>
                    <input type="text" id="fAddress" required>
                </div>
                <button type="submit" class="btn-submit">Lưu</button>
            </form>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="fc-modal-backdrop" id="confirmModal">
        <div class="fc-modal" style="width:min(400px,90vw);">
            <h2 class="modal-title">Xác nhận xóa</h2>
            <p class="confirm-text">Bạn có chắc muốn xóa rạp này?</p>
            <div class="confirm-actions">
                <button class="btn-cancel" id="btnCancelDelete">Hủy</button>
                <button class="btn-confirm-delete" id="btnConfirmDelete">Xóa</button>
            </div>
        </div>
    </div>

    <script src="/Admin/admin-cinema.js"></script>
</body>
</html>
